```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Date Viewer</title>

    <!-- ✅ Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- ✅ Axios CDN (AJAX easy) -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-dark text-light">

<div class="container py-5 text-center">
    <h1 class="mb-4">📅 Server Date API</h1>

    <div class="card bg-secondary p-4 shadow-lg">
        <h2 id="date">Loading...</h2>
        <p id="time"></p>
        <p id="timezone"></p>
        <p id="extra"></p>

        <button class="btn btn-warning mt-3" onclick="getDate()">🔄 Refresh</button>
    </div>
</div>

<script>
const API_URL = "https://ingr.lovestoblog.com/api.php";

// Fetch using Axios (AJAX)
async function getDate() {
    try {
        document.getElementById("date").innerText = "Loading...";

        const res = await axios.get(API_URL);

        const data = res.data;

        if (!data.success) {
            throw new Error("API Error");
        }

        document.getElementById("date").innerText = data.date.full;
        document.getElementById("time").innerText = "⏰ " + data.time.time_12hr;
        document.getElementById("timezone").innerText = "🌍 " + data.timezone.name + " (" + data.timezone.offset + ")";
        document.getElementById("extra").innerText = 
            "📆 Week: " + data.date.week_of_year + 
            " | Day: " + data.date.day_of_year;

    } catch (err) {
        document.getElementById("date").innerText = "❌ Error loading data";
        console.error(err);
    }
}

// Auto load
getDate();
</script>

<!-- ✅ Bootstrap JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
```
