<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Server Date API</title> <!-- Bootstrap CDN --> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <style> body { background: #111; color: #fff; } .card { max-width: 500px; margin: auto; } </style> </head> <body> <div class="container py-5 text-center"> <h1 class="mb-4">📅 Server Date API</h1> <div class="card bg-dark p-4 shadow"> <h2 id="date">Loading...</h2> <p id="time"></p> <p id="timezone"></p> <p id="extra"></p> <button class="btn btn-warning mt-3" onclick="getDate()">🔄 Refresh</button> </div> </div> <script> const API_URL = "https://ingr.lovestoblog.com/api.php"; async function getDate() { try { document.getElementById("date").innerText = "Loading..."; const res = await fetch(API_URL, { cache: "no-store" }); // 🔍 RAW response debug const text = await res.text(); console.log("RAW RESPONSE:", text); // JSON parse const data = JSON.parse(text); if (!data.success) { throw new Error("API Error"); } // UI update document.getElementById("date").innerText = data.date.full; document.getElementById("time").innerText = "⏰ " + data.time.time_12hr; document.getElementById("timezone").innerText = "🌍 " + data.timezone.name + " (" + data.timezone.offset + ")"; document.getElementById("extra").innerText = "📆 Week: " + data.date.week_of_year + " | Day: " + data.date.day_of_year; } catch (err) { console.error("ERROR:", err); document.getElementById("date").innerText = "❌ Error loading data"; document.getElementById("time").innerText = ""; document.getElementById("timezone").innerText = ""; document.getElementById("extra").innerText = ""; } } // Auto load getDate(); </script> </body> </html>
