<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Live Server Date · Fetch Today's Date</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b2b3b 0%, #1a4a5f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
    }

    /* elegant glassmorphic card */
    .date-card {
      max-width: 680px;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      border-radius: 3.5rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
      padding: 2rem 2rem 2.5rem 2rem;
      transition: all 0.3s ease;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #FFF8E7, #FFE6C7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.75rem;
      text-shadow: 0 2px 3px rgba(0,0,0,0.1);
    }

    .subhead {
      color: #c6ecff;
      font-weight: 500;
      font-size: 0.95rem;
      background: rgba(0, 0, 0, 0.25);
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      margin-bottom: 2rem;
    }

    /* main date display area */
    .date-display {
      background: rgba(10, 25, 35, 0.7);
      border-radius: 2.5rem;
      padding: 1.8rem 1rem;
      margin: 1rem 0 1.2rem 0;
      border: 1px solid rgba(255, 255, 255, 0.25);
      transition: all 0.2s;
    }

    .full-date {
      font-size: 2.7rem;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 2px;
      color: #FEF9E6;
      word-break: break-word;
      text-shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    .weekday {
      font-size: 1.4rem;
      font-weight: 500;
      color: #FFE3B5;
      margin-top: 0.6rem;
      letter-spacing: 0.5px;
    }

    /* timestamp or server meta */
    .server-meta {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 60px;
      padding: 0.7rem 1rem;
      margin: 1rem 0 1.8rem 0;
      font-size: 0.85rem;
      font-family: monospace;
      color: #B9E6F5;
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .badge {
      background: #0f2f3b;
      padding: 0.25rem 0.9rem;
      border-radius: 30px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* status indicator & loader */
    .status-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      margin-top: 0.5rem;
      margin-bottom: 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .loader {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255, 245, 210, 0.4);
      border-top: 3px solid #FFE6A3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status-message {
      color: #F2E8CF;
      background: rgba(0,0,0,0.4);
      padding: 0.25rem 1rem;
      border-radius: 50px;
    }

    .error-message {
      color: #FFB7A7;
      background: rgba(120, 30, 20, 0.7);
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      font-weight: 500;
    }

    button {
      background: #FFD966;
      border: none;
      padding: 0.8rem 1.8rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 60px;
      color: #1e3e4a;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.75rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      font-family: inherit;
      letter-spacing: 0.3px;
    }

    button:hover {
      background: #FFE18A;
      transform: scale(0.97);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    button:active {
      transform: scale(0.96);
    }

    footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #97C8DB;
      opacity: 0.8;
    }

    @media (max-width: 500px) {
      .date-card {
        padding: 1.5rem;
      }
      .full-date {
        font-size: 1.8rem;
      }
      .weekday {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

<div class="date-card">
  <h1>📅  Server Date  🌐</h1>
  <div class="subhead">official real-time date from API</div>

  <!-- dynamic date core -->
  <div class="date-display">
    <div class="full-date" id="serverDateValue">— — —</div>
    <div class="weekday" id="weekdayName">loading server time...</div>
  </div>

  <!-- server meta info -->
  <div class="server-meta">
    <span class="badge">🕒 source: backend JSON</span>
    <span class="badge" id="timezoneHint">UTC / local</span>
  </div>

  <!-- status + loader + retry -->
  <div class="status-area" id="statusArea">
    <div class="loader" id="loaderIcon"></div>
    <span class="status-message" id="statusText">Fetching today's date from server...</span>
  </div>

  <button id="refreshBtn">⟳  Refresh from server</button>
  <footer>ISO date & formatted — live fetch on page load</footer>
</div>

<script>
  (function() {
    // ---------- DOM elements ----------
    const serverDateSpan = document.getElementById('serverDateValue');
    const weekdaySpan = document.getElementById('weekdayName');
    const statusTextDiv = document.getElementById('statusText');
    const loaderIcon = document.getElementById('loaderIcon');
    const statusArea = document.getElementById('statusArea');
    const timezoneHintSpan = document.getElementById('timezoneHint');
    const refreshBtn = document.getElementById('refreshBtn');

    // Helper: format date beautifully (YYYY-MM-DD + weekday)
    function formatDateObject(dateObj) {
      if (!dateObj || isNaN(dateObj.getTime())) {
        return { formatted: 'Invalid date', weekday: '---' };
      }
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      const formattedYMD = `${year}-${month}-${day}`;
      
      // Weekday names
      const weekdays = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const weekdayName = weekdays[dateObj.getDay()];
      return { formatted: formattedYMD, weekday: weekdayName };
    }

    // Show loading UI state
    function setLoading(isLoading, customMessage = null) {
      if (isLoading) {
        loaderIcon.style.display = 'inline-block';
        if (customMessage) {
          statusTextDiv.innerText = customMessage;
        } else {
          statusTextDiv.innerText = 'Fetching today\'s date from server...';
        }
        statusTextDiv.className = 'status-message';
        // remove any error styling
        statusTextDiv.style.background = '';
      } else {
        loaderIcon.style.display = 'none';
      }
    }

    // Show error state
    function showError(errorMsg) {
      loaderIcon.style.display = 'none';
      statusTextDiv.innerText = `⚠️ ${errorMsg}`;
      statusTextDiv.className = 'error-message';
      // also optionally reset date fields to friendly error placeholder
      serverDateSpan.innerText = '❗ Error';
      weekdaySpan.innerText = 'could not reach server';
    }

    // Show success status message temporarily (non-error)
    function showSuccessStatus(msg) {
      if (!statusTextDiv.classList.contains('error-message')) {
        statusTextDiv.className = 'status-message';
      }
      statusTextDiv.innerText = msg;
      // revert after 3 sec? but keep until next fetch
      // but we want to keep success message, but we set later after fetch anyway.
    }

    // main function to fetch today's date from server (expected JSON: { date, iso, formatted } etc)
    // We'll design flexible: we accept typical { date: "2026-03-29", ... } or { currentDate, isoString, serverTime }
    // Our mock API will be a public endpoint or we can build a mock? Better use a reliable free API that returns current date.
    // However many APIs return datetime. We'll use WorldTimeAPI? But sometimes CORS? We can use 'https://worldtimeapi.org/api/timezone/Etc/UTC'
    // That returns current datetime. But we need only date. Also we can use a lightweight proxy? But to guarantee cross-origin, worldtimeapi supports CORS.
    // Alternatively use 'https://timeapi.io/api/time/current/zone?timeZone=UTC' but worldtimeapi is classic.
    // For robustness we will try two fallback mechanisms: first try worldtimeapi, if fails use our own local backup? But requirement: fetch server date => JSON.
    // To be fully compliant with "server date" we must fetch external server date. I'll implement fetch to 'https://worldtimeapi.org/api/timezone/Asia/Kolkata' or 'Etc/UTC'.
    // But we can also provide an option: if network fails, show proper error. On page load: fetch date. We'll use 'https://worldtimeapi.org/api/timezone/Asia/Kolkata' (gives IST)
    // We'll then parse datetime string and extract date. That's true server date. Also we can show timezone hint.
    // Additionally I'll add a secondary backup: if primary fails, fallback to 'https://timeapi.io/api/time/current/zone?timeZone=UTC'? but might be extra.
    // For simplicity and reliability, I'll fetch from worldtimeapi and also provide a small cache buster.
    
    let currentAbortController = null;

    async function fetchServerDate() {
      // Cancel any ongoing request to avoid race
      if (currentAbortController) {
        currentAbortController.abort();
      }
      currentAbortController = new AbortController();
      const signal = currentAbortController.signal;

      // Show loading (retain loader)
      setLoading(true);
      // reset any residual error style from date display fields to neutral
      serverDateSpan.innerText = '— — —';
      weekdaySpan.innerText = 'waiting for response...';
      
      // We'll try primary reliable API (worldtimeapi) that returns datetime string
      // CORS enabled, free, no API key. Using Asia/Kolkata for consistency but any timezone works for date.
      // We'll extract date portion from datetime field. Also we could use /api/timezone/UTC.
      const primaryUrl = 'https://worldtimeapi.org/api/timezone/Asia/Kolkata';
      // Backup URL (optional second endpoint if primary fails)
      const fallbackUrl = 'https://worldtimeapi.org/api/timezone/Etc/UTC';
      
      let finalDateObj = null;
      let usedTimezone = '';

      const attemptFetch = async (url, timezoneLabel) => {
        try {
          const response = await fetch(url, { 
            signal,
            cache: 'no-store',
            headers: { 'Accept': 'application/json' }
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          // worldtimeapi returns datetime property like "2026-03-29T12:34:56.789123+05:30"
          if (data && data.datetime) {
            const isoString = data.datetime;
            const parsedDate = new Date(isoString);
            if (isNaN(parsedDate.getTime())) throw new Error('Invalid date from server');
            return { dateObj: parsedDate, tz: timezoneLabel };
          } else {
            throw new Error('No datetime field in response');
          }
        } catch (err) {
          // rethrow to outer handler
          throw err;
        }
      };

      try {
        // Try primary (Asia/Kolkata)
        const result = await attemptFetch(primaryUrl, 'Asia/Kolkata (IST)');
        finalDateObj = result.dateObj;
        usedTimezone = result.tz;
      } catch (primaryErr) {
        console.warn('Primary worldtimeapi failed, trying fallback UTC endpoint', primaryErr);
        try {
          const fallbackResult = await attemptFetch(fallbackUrl, 'UTC (Universal)');
          finalDateObj = fallbackResult.dateObj;
          usedTimezone = fallbackResult.tz;
        } catch (fallbackErr) {
          console.error('Both worldtimeapi endpoints failed', fallbackErr);
          throw new Error('Unable to fetch server date from time API. Please check connection or try again.');
        }
      }
      
      // If we successfully got dateObj
      if (finalDateObj) {
        const { formatted, weekday } = formatDateObject(finalDateObj);
        serverDateSpan.innerText = formatted;
        weekdaySpan.innerText = `${weekday} · ${usedTimezone.split(' ')[0]}`;
        timezoneHintSpan.innerHTML = `🕒 server zone: ${usedTimezone}`;
        // update status success
        setLoading(false);
        statusTextDiv.className = 'status-message';
        statusTextDiv.innerText = `✅ Server date fetched · ${new Date().toLocaleTimeString()}`;
        // refresh auto-hide after 4 seconds? but not necessary.
        // but keep success message until next fetch.
        return true;
      } else {
        throw new Error('no date object resolved');
      }
    }

    // Advanced fallback: pure backup if worldtimeapi completely fails (CORS / offline) 
    // We'll define a more robust error UI but also allow manual retry. Our above fetch will throw.
    // On error, show error and keep retry button.
    
    async function loadDateOnLoadAndRefresh() {
      try {
        await fetchServerDate();
      } catch (error) {
        // If error is abort error, ignore
        if (error.name === 'AbortError') {
          console.log('Fetch aborted by user');
          return;
        }
        console.error('Date fetch error:', error);
        let friendlyMsg = error.message || 'Network or server error';
        if (friendlyMsg.includes('Failed to fetch') || friendlyMsg.includes('NetworkError')) {
          friendlyMsg = 'Network error: cannot reach time server. Check your internet.';
        } else if (friendlyMsg.includes('HTTP')) {
          friendlyMsg = 'Server responded with error. Try again later.';
        }
        showError(friendlyMsg);
        serverDateSpan.innerText = '⚠️ offline';
        weekdaySpan.innerText = 'unable to load server date';
        timezoneHintSpan.innerHTML = '🕒 connection failed';
        setLoading(false);
      } finally {
        // ensure loader hidden if error case already hidden inside showError, but setLoading false again to avoid double loader
        if (loaderIcon) loaderIcon.style.display = 'none';
      }
    }

    // Manual refresh handler with abort previous
    let isRefreshing = false;
    async function handleRefresh() {
      if (isRefreshing) return;
      isRefreshing = true;
      refreshBtn.disabled = true;
      refreshBtn.style.opacity = '0.7';
      try {
        await loadDateOnLoadAndRefresh();
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.style.opacity = '1';
        isRefreshing = false;
      }
    }

    // Attach refresh event
    refreshBtn.addEventListener('click', (e) => {
      e.preventDefault();
      handleRefresh();
    });

    // Initialize on page load: fetch server date and show.
    // additionally we set a small timeout to avoid race on initial load
    window.addEventListener('DOMContentLoaded', () => {
      // small delay not necessary, but run fetch
      loadDateOnLoadAndRefresh();
    });
    
    // Optional: add extra style for better button feedback
    // And clean abort on page unload
    window.addEventListener('beforeunload', () => {
      if (currentAbortController) {
        currentAbortController.abort();
      }
    });
  })();
</script>
</body>
  </html>
